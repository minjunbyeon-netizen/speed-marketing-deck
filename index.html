<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>스피드설비 — 홈페이지 제안 (목차)</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css">
<style>
  :root{
    --ink:#14202b; --sub:#9fc0cc; --navy:#0c2f4a; --dark:#0c2f4a; --darker:#082234;
    --aqua:#0fa9cc; --aqua-2:#0b88a3; --mint:#86dcf0; --line:rgba(255,255,255,.12);
    --radius:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  b,strong{font-weight:800;}
  html,body{min-height:100%;}
  body{font-family:"Pretendard Variable",Pretendard,-apple-system,BlinkMacSystemFont,system-ui,"Segoe UI",sans-serif;
    background:var(--darker);color:#eaf4f8;line-height:1.55;letter-spacing:-0.02em;-webkit-font-smoothing:antialiased;
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:7vh 7vw;}
  .hub{width:100%;max-width:980px;}
  .logo{font-size:clamp(12px,1.1vw,16px);letter-spacing:.34em;color:var(--mint);font-weight:800;text-transform:uppercase;margin-bottom:clamp(16px,3vh,30px);}
  h1{font-size:clamp(30px,4.6vw,62px);letter-spacing:-0.035em;font-weight:800;line-height:1.15;color:#fff;}
  h1 span{color:var(--mint);}
  .sub{font-size:clamp(15px,1.5vw,22px);color:var(--sub);margin-top:clamp(12px,2vh,20px);max-width:36em;}

  .cards{display:grid;grid-template-columns:1fr 1fr;gap:clamp(14px,1.8vw,26px);margin-top:clamp(28px,5vh,52px);}
  .card{display:flex;flex-direction:column;text-decoration:none;color:inherit;
    background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:var(--radius);
    padding:clamp(24px,3.4vh,40px) clamp(22px,2.4vw,38px);transition:transform .18s ease,background .18s ease,border-color .18s ease;}
  .card:hover{transform:translateY(-4px);background:rgba(15,169,204,.12);border-color:rgba(15,169,204,.5);}
  .card .n{font-size:clamp(13px,1.2vw,18px);font-weight:800;color:var(--aqua);letter-spacing:.04em;margin-bottom:clamp(12px,1.8vh,20px);}
  .card h2{font-size:clamp(20px,2.2vw,34px);font-weight:800;letter-spacing:-0.03em;color:#fff;line-height:1.2;}
  .card p{font-size:clamp(13px,1.15vw,18px);color:var(--sub);margin-top:clamp(10px,1.6vh,16px);line-height:1.6;flex:1;}
  .card .go{margin-top:clamp(16px,2.4vh,24px);font-size:clamp(13px,1.15vw,18px);font-weight:800;color:var(--mint);}

  .foot{display:flex;gap:clamp(20px,3vw,52px);flex-wrap:wrap;margin-top:clamp(28px,5vh,52px);padding-top:clamp(18px,3vh,28px);border-top:1px solid var(--line);}
  .foot span{font-size:clamp(13px,1.2vw,18px);color:#cfe6ee;}
  .foot b{color:#6f97a8;font-weight:800;font-size:clamp(10px,.85vw,13px);letter-spacing:.12em;text-transform:uppercase;margin-right:8px;}

  @media (max-width:680px){ .cards{grid-template-columns:1fr;} body{padding:6vh 7vw;} }
</style>
</head>
<body>
  <main class="hub">
    <div class="logo">스피드설비 · 홈페이지 제안</div>
    <h1>홈페이지, <span>왜 필요하고</span><br>어떻게 활용하나</h1>
    <p class="sub">두 자료로 나눠 정리했습니다. 위에서부터 순서대로 보시길 권합니다.</p>

    <div class="cards">
      <a class="card" href="why.html">
        <span class="n">자료 01</span>
        <h2>왜 홈페이지가<br>필요한가</h2>
        <p>블로그·인스타가 있어도 홈페이지가 필요한 이유. SNS는 빌린 땅, 홈페이지는 내 땅입니다.</p>
        <span class="go">자료 열기 →</span>
      </a>
      <a class="card" href="marketing.html">
        <span class="n">자료 02</span>
        <h2>홈페이지<br>마케팅 활용</h2>
        <p>만든 홈페이지로 손님을 더 부르는 법 10가지. 방문·전화를 숫자로 측정해 광고를 최적화합니다.</p>
        <span class="go">자료 열기 →</span>
      </a>
    </div>

    <div class="foot">
      <span><b>담당</b>기획팀</span>
      <span><b>연락처</b>010-3108-6424</span>
      <span><b>이름</b>구태우 실장</span>
    </div>
  </main>
</body>
</html>
